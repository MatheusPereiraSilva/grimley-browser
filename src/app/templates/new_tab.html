<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nova aba</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f9fc;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #1a73e8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(26, 115, 232, 0.16), transparent 30%),
                var(--bg);
        }
        .card {
            width: min(720px, 100%);
            padding: 36px;
            border-radius: 24px;
            background: var(--card);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
            text-align: center;
        }
        h1 { margin: 0 0 12px; font-size: 34px; }
        p { margin: 0; color: var(--muted); font-size: 16px; line-height: 1.5; }
        strong { color: var(--accent); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nova aba</h1>
        <p>Digite uma URL na barra acima ou abra um link em <strong>nova guia</strong>.</p>
    </div>
</body>
</html>
